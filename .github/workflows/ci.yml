name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — type check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Prisma reads DATABASE_URL via prisma.config.ts; a dummy value is enough
      # for `prisma generate` and `tsc` (no DB connection is made during CI).
      DATABASE_URL: postgresql://user:pass@localhost:5432/o2o_gym?schema=public
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

  frontend:
    name: Frontend — type check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: https://api.example.com/api/v1
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
